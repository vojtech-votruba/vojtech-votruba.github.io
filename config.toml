base_url = "https://vojtech-votruba.github.io"

compile_sass = false

build_search_index = true

default_language = "en"
author = "Vojtěch Votruba"
title = "Vojtěch Votruba"
theme = "linkita"
generate_feeds = true
feed_filenames = ["atom.xml"]

[extra]
math = true
use_cdn = true
title_separator = " | "
header_menu_name = "menu_name"
menu_i18n = false
disable_default_favicon = false
favicon = "favicon.ico"

[extra.style]
bg_color = "#f4f4f5"
bg_dark_color = "#18181b"

header_blur = false
header_color = "#e4e4e7"
header_dark_color = "#27272a"

[extra.menus]
menu_name = [
  { url = "$BASE_URL/projects", name="Projects"},
  { url = "$BASE_URL/diaries", name="Diaries (mostly in Czech)"}
]

[extra.footer]
since = 2021
copyright = "&copy; $YEAR Vojtěch Votruba"
